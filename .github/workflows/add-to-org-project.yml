name: Add to organisation project

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1
        with:
          project-url: https://github.com/orgs/THD-Spatial-AI/projects/7
          github-token: ${{ secrets.ADD_TO_PROJECT_PAT }}
