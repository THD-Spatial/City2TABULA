# Project information
site_name: City2TABULA
site_author: THD-Spatial-AI
site_url: https://github.com/thd-spatial-ai/city2tabula

# Repository
repo_name: city2tabula
repo_url: https://github.com/thd-spatial-ai/city2tabula
edit_uri: edit/main/docs/

# Theme configuration
theme:
  name: material
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.tooltips
    - navigation.expand
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.prune
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.path
    - navigation.tracking
    - navigation.sections
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    - toc.integrate
  language: en
  palette:
      - media: "(prefers-color-scheme)"
        toggle:
          icon: material/link
          name: Switch to light mode
      - media: "(prefers-color-scheme: light)"
        scheme: default
        primary: black
        accent: indigo
        toggle:
          icon: material/toggle-switch
          name: Switch to dark mode
      - media: "(prefers-color-scheme: dark)"
        scheme: slate
        primary: black
        accent: black
        toggle:
          icon: material/toggle-switch-off
          name: Switch to system preference
  font:
    text: Roboto
    code: Roboto Mono
  logo: assets/logo/svg/city2tabula_logo_icon.svg
# Plugins
plugins:
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - git-revision-date-localized:
      enable_creation_date: true

# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Page tree
nav:
  - Home: index.md
  - Setup & Installation: installation/setup.md
  - Data: example/example.md
  - Code:
    - Job Queue & Worker Pipeline: code/job-queue.md
    - SQL Extraction Pipeline:
      - Overview: code/sql-pipeline/index.md
      - 01 – Get Child Features: code/sql-pipeline/01-get-child-features.md
      - 02 — Dump Geometry: code/sql-pipeline/02-dump-geometry.md
      - 03 — Surface Attributes: code/sql-pipeline/03-surface-attributes.md
      - 04 — Building Features: code/sql-pipeline/04-building-features.md
      - 05 — Volume: code/sql-pipeline/05-volume.md
      - 06 — Storeys: code/sql-pipeline/06-storeys.md
      - 07 — TABULA Labelling: code/sql-pipeline/07-tabula-labelling.md

extra:
  version:
    provider: mike

extra_css:
  - stylesheets/extra.css

